{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
  <div class="text-center animate-fade-up">
    <div class="text-8xl font-black text-red-400 mb-4">500</div>
    <h1 class="text-2xl font-bold text-white mb-2">Server Error</h1>
    <p class="text-slate-400 mb-6">Something went wrong. The error has been logged. Please try again.</p>
    <a href="{{ url_for('index') }}" class="brand-btn px-6 py-2.5 text-sm inline-block">Go to Dashboard</a>
  </div>
</div>
{% endblock %}
