{% extends 'base.html' %}
{% block title %}Add Customer — Vayapaar-AI{% endblock %}

{% block content %}
<div class="p-6 max-w-lg mx-auto space-y-5">

  <div class="flex items-center gap-3 animate-fade-up">
    <a href="{{ url_for('customers.index') }}"
       class="p-2 rounded-xl hover:bg-white/5 text-slate-400 hover:text-white transition-all">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <div>
      <h1 class="text-xl font-bold text-white">Add Customer</h1>
      <p class="text-slate-400 text-sm">Register a new customer profile</p>
    </div>
  </div>

  <form method="POST" novalidate class="glass-card p-6 space-y-4 animate-fade-up delay-1">

    <!-- Name -->
    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">
        Full Name *
      </label>
      <div class="relative">
        <i data-lucide="user" class="absolute left-3.5 top-3 w-4 h-4 text-slate-500"></i>
        <input type="text" name="name" value="{{ form_data.get('name','') }}" required maxlength="150"
          class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white
                 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
          placeholder="Smt. Priya Verma"/>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- Phone -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Phone</label>
        <div class="relative">
          <i data-lucide="phone" class="absolute left-3.5 top-3 w-4 h-4 text-slate-500"></i>
          <input type="tel" name="phone" value="{{ form_data.get('phone','') }}" maxlength="15"
            class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white
                   placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
            placeholder="+91 98765 43210"/>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Email</label>
        <div class="relative">
          <i data-lucide="mail" class="absolute left-3.5 top-3 w-4 h-4 text-slate-500"></i>
          <input type="email" name="email" value="{{ form_data.get('email','') }}"
            class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white
                   placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
            placeholder="priya@example.com"/>
        </div>
      </div>
    </div>

    <!-- Address -->
    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Address</label>
      <textarea name="address" rows="2"
        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white
               placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all resize-none"
        placeholder="House No., Street, City…">{{ form_data.get('address','') }}</textarea>
    </div>

    <!-- Credit Limit -->
    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">
        Credit Limit (₹)
        <span class="text-slate-600 normal-case font-normal ml-1">— for Udhaari / Khata</span>
      </label>
      <div class="relative">
        <span class="absolute left-3.5 top-2.5 text-slate-500 text-sm font-bold">₹</span>
        <input type="number" name="credit_limit" value="{{ form_data.get('credit_limit','0') }}"
          min="0" step="100"
          class="w-full bg-white/5 border border-white/10 rounded-xl pl-8 pr-4 py-2.5 text-sm text-white
                 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
          placeholder="0 = no credit allowed"/>
      </div>
      <p class="text-xs text-slate-600 mt-1">
        Set to 0 for cash-only customers. Credit sales will show in Khata.
      </p>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="brand-btn px-6 py-2.5 text-sm">{{ t.save }}</button>
      <a href="{{ url_for('customers.index') }}"
         class="px-6 py-2.5 border border-white/10 rounded-xl text-sm text-slate-400
                hover:bg-white/5 hover:text-white transition-all">
        {{ t.cancel }}
      </a>
    </div>
  </form>

</div>
{% endblock %}
