{% extends 'base.html' %}
{% block title %}Set New Password — Vayapaar-AI{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4"
     style="background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(247,177,32,0.12) 0%, transparent 65%), #020617;">

  <div class="w-full max-w-md animate-fade-up">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl brand-btn flex items-center justify-center text-2xl font-black mx-auto mb-3"
           style="box-shadow: 0 8px 28px rgba(247,177,32,0.3);">V</div>
      <h1 class="text-2xl font-bold text-white">Set New Password</h1>
      <p class="text-slate-400 text-sm mt-1">Choose a strong password for your account</p>
    </div>

    <div class="glass-card p-8">
      <form method="POST" novalidate>
        <input type="hidden" name="token" value="{{ token }}"/>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1.5 uppercase tracking-wide">New Password *</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3.5 top-3 w-4 h-4 text-slate-500"></i>
              <input type="password" name="password" id="pwd1" required minlength="8" autofocus
                class="w-full bg-white/[0.06] border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white
                       placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
                placeholder="At least 8 characters"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1.5 uppercase tracking-wide">Confirm Password *</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3.5 top-3 w-4 h-4 text-slate-500"></i>
              <input type="password" name="confirm_password" id="pwd2" required
                class="w-full bg-white/[0.06] border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white
                       placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
                placeholder="Repeat new password" oninput="checkMatch()"/>
            </div>
            <p id="matchMsg" class="text-xs mt-1"></p>
          </div>
        </div>

        <button type="submit"
          class="brand-btn w-full py-2.5 mt-6 text-sm font-bold flex items-center justify-center gap-2">
          <i data-lucide="shield-check" class="w-4 h-4"></i>
          Update Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function checkMatch() {
  const p1  = document.getElementById('pwd1').value;
  const p2  = document.getElementById('pwd2').value;
  const msg = document.getElementById('matchMsg');
  if (!p2) { msg.textContent = ''; return; }
  if (p1 === p2) {
    msg.textContent = '✓ Passwords match';
    msg.style.color = '#22c55e';
  } else {
    msg.textContent = '✗ Passwords do not match';
    msg.style.color = '#ef4444';
  }
}
</script>
{% endblock %}
