{% extends 'base.html' %}
{% block title %}Forgot Password — Vayapaar-AI{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4"
     style="background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(247,177,32,0.12) 0%, transparent 65%), #020617;">

  <div class="w-full max-w-md animate-fade-up">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl brand-btn flex items-center justify-center text-2xl font-black mx-auto mb-3"
           style="box-shadow: 0 8px 28px rgba(247,177,32,0.3);">V</div>
      <h1 class="text-2xl font-bold text-white">Reset Your Password</h1>
      <p class="text-slate-400 text-sm mt-1.5">Enter your registered email address below</p>
    </div>

    <div class="glass-card p-8">
      <form method="POST" novalidate>
        <div class="mb-5">
          <label class="block text-xs font-semibold text-slate-300 mb-1.5 uppercase tracking-wide">Email Address</label>
          <div class="relative">
            <i data-lucide="mail" class="absolute left-3.5 top-3 w-4 h-4 text-slate-500"></i>
            <input type="email" name="email" required autofocus
              class="w-full bg-white/[0.06] border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white
                     placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-400/50 transition-all"
              placeholder="you@yourbusiness.com"/>
          </div>
          <p class="text-xs text-slate-500 mt-2">
            We'll send a password reset link (valid for 1 hour).
          </p>
        </div>

        <button type="submit"
          class="brand-btn w-full py-2.5 text-sm font-bold flex items-center justify-center gap-2">
          <i data-lucide="send" class="w-4 h-4"></i>
          Send Reset Link
        </button>

        <p class="text-center text-xs text-slate-500 mt-5">
          <a href="{{ url_for('auth.login') }}"
             class="text-brand-400 hover:underline flex items-center justify-center gap-1">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Login
          </a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
